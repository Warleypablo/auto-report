services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: autoreport-backend
    runtime: python
    plan: starter  # free tier dorme após inatividade — starter mantém sempre ativo
    region: oregon
    rootDir: .
    buildCommand: pip install -r web/backend/requirements.txt -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright-browsers python -m playwright install --with-deps chromium
    startCommand: bash scripts/start-backend.sh
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/web/backend
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
      - key: DATABASE_URL
        sync: false  # preencher no dashboard: postgresql+psycopg://user:pass@<cloud-sql-ip>:5432/vitrine
      - key: CORS_ORIGINS
        value: '["https://autoreport-frontend.onrender.com"]'  # ajustar para URL real do frontend
      - key: JWT_SECRET
        generateValue: true
      - key: ETL_TRIGGER_TOKEN
        value: "turbo-internal-token-2026"
      - key: JWT_EXPIRY_HOURS
        value: "8"
      - key: ETL_THREADS
        value: "5"
      # Senha global da área do cliente (/cliente/login). Trocar via dashboard
      # antes do primeiro deploy. Mesma senha para todos os CNPJs.
      - key: CLIENTE_PASSWORD
        sync: false
      # Credenciais Google — base64 dos arquivos locais (ver scripts/encode-credentials.sh)
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_B64
        sync: false
      - key: GOOGLE_ADS_YAML_B64
        sync: false
      # Planilha central
      - key: CENTRAL_SHEET_URL
        sync: false
      - key: CENTRAL_TAB_NAME
        value: Automacao-Report
      - key: TEMPLATE_RELATORIO_ID
        sync: false
      - key: RELATORIO_FOLDER_ID
        sync: false
      - key: TEMPLATE_ECOMMERCE
        sync: false
      - key: TEMPLATE_LEAD_SEM_SITE
        sync: false
      - key: TEMPLATE_LEAD_COM_SITE
        sync: false
      # Meta Ads
      - key: ACCESS_TOKEN_META_SYSTEM
        sync: false
      - key: ACCESS_TOKEN_META_HUMAN
        sync: false
      - key: ID_SYSTEM_USER
        sync: false
      - key: BUSINESS_ID_META
        sync: false
      - key: APP_ID_META
        sync: false

  # ── Cron: re-sincroniza staging.cup_* a partir do ClickUp (dados_turbo) ──────
  # Sem isto, a staging que o app lê congela e os gestores ficam velhos.
  # Antes do 1º deploy, preencher CUP_SOURCE_URL e CUP_DEST_URL no dashboard.
  - type: cron
    name: sync-staging-clickup
    runtime: python
    plan: starter
    region: oregon
    rootDir: .
    schedule: "0 6 * * *"  # diariamente às 06:00 UTC (~03:00 BRT)
    buildCommand: pip install -r web/backend/requirements.txt
    startCommand: cd web/backend && python -m scripts.sync_staging_clickup
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/web/backend
      - key: CUP_SOURCE_URL
        sync: false  # postgresql://USER:PASS@<host>:5432/dados_turbo  (schema "Clickup")
      - key: CUP_DEST_URL
        sync: false  # postgresql://USER:PASS@<host>:5432/autoreport

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  - type: web
    name: autoreport-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: web/frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: INTERNAL_API_URL
        value: https://autoreport-backend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://autoreport-backend.onrender.com
      - key: INTERNAL_API_TOKEN
        value: "turbo-internal-token-2026"
